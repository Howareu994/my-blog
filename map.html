<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* =========================================
           1. 全局变量 (统一管理柏林夜色与霓虹)
           ========================================= */
        :root {
            --bg-dark: #0b2e4a;
            --bg-gradient-top: #0e305a;
            --text-main: #e0e0e0;
            --text-muted: #b3d4ec;
            --accent-pink: #ff4d94;
            --accent-gold: #FFB800;
            --accent-green: #00FF88;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-hover: rgba(255, 255, 255, 0.15);
        }

        /* =========================================
           2. 基础布局与结构
           ========================================= */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 55vh;
            flex-shrink: 0;
        }

        #sidebar {
            width: 100%;
            height: 45vh;
            padding: 12px;
            box-sizing: border-box;
            background: linear-gradient(180deg, var(--bg-gradient-top) 0%, var(--bg-dark) 100%);
            border-top: 2px solid var(--accent-pink);
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           3. 控制栏与交互组件
           ========================================= */
        .controls-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        #search-input, #sort-restaurants {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #4a8bbd;
            color: white;
            border-radius: 4px;
            padding: 8px;
            font-size: 13px;
        }

        #search-input { flex-grow: 1; }

        /* =========================================
           4. 餐厅列表与卡片样式
           ========================================= */
        #restaurant-list {
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        .restaurant-item {
            padding: 12px;
            margin-bottom: 8px;
            background: var(--card-bg);
            border-radius: 8px;
            border-left: 4px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .restaurant-item:hover,
        .restaurant-item.active {
            background: var(--card-hover);
            border-left-color: var(--accent-gold);
        }

        .restaurant-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
            color: #fff;
        }

        .visited-green { color: var(--accent-green) !important; }

        .nav-link {
            color: var(--accent-gold);
            font-size: 11px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 5px;
            display: inline-block;
        }

        /* =========================================
           5. 地图标记 (Marker) 动画与页脚
           ========================================= */
        .amber-node {
            background-color: var(--accent-gold);
            border-radius: 50%;
            border: 2px solid var(--bg-dark);
            box-shadow: 0 0 10px var(--accent-gold);
            animation: pulse 2s infinite;
        }

        .green-node {
            background-color: var(--accent-green);
            border-radius: 50%;
            border: 2px solid var(--bg-dark);
            box-shadow: 0 0 10px var(--accent-green), 0 0 20px var(--accent-green);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0.8); }
            70% { box-shadow: 0 0 0 8px rgba(255, 184, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0); }
        }

        footer {
            font-size: 10px;
            color: #666;
            text-align: center;
            padding: 10px 0;
            border-top: 1px solid var(--card-bg);
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <div class="controls-row">
            <input type="text" id="search-input" placeholder="搜索餐厅...">
            <select id="sort-restaurants">
                <option value="default">默认</option>
                <option value="az">A-Z</option>
                <option value="za">Z-A</option>
            </select>
        </div>
        <div id="restaurant-list"></div>
        <footer>
            <div style="color: var(--accent-gold); margin-bottom: 3px;">数据来源：berlin_slowtour (小红书)</div>
            © 2026 柏林美食雷达 | OSM, CARTO
        </footer>
    </div>

<script>
    // 1. 地图初始化与图层设置
    const map = L.map('map').setView([52.5200, 13.4050], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    const markersLayer = L.layerGroup().addTo(map);

    // 2. DOM 元素缓存
    const listContainer = document.getElementById('restaurant-list');
    const searchInput = document.getElementById('search-input');
    const sortSelect = document.getElementById('sort-restaurants');

    let allData = [];

    // 3. 核心渲染函数
    function render(data) {
        listContainer.innerHTML = '';
        markersLayer.clearLayers();

        data.forEach(res => {
            const lat = parseFloat(res.lat);
            const lon = parseFloat(res.lon || res.lng || res.longitude);
            const isVisited = (res.Visited || res.visited || "").toString().toLowerCase().trim() === 'yes';

            if (!isNaN(lat) && !isNaN(lon)) {
                const address = res.address || '';
                const googleUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(res.name + ' ' + (address || 'Berlin'))}`;

                // 创建地图 Marker
                const markerClass = isVisited ? 'green-node' : 'amber-node';
                const marker = L.marker([lat, lon], {
                    icon: L.divIcon({ className: `obsidian-node ${markerClass}`, iconSize: [12, 12] })
                });

                marker.bindPopup(`
                    <div style="color: var(--bg-dark); min-width: 140px;">
                        <b style="font-size: 14px;">${isVisited ? '✅ ' : ''}${res.name}</b><br>
                        <span style="font-size: 11px; color: #666;">${address}</span><br>
                        <a href="${googleUrl}" target="_blank" style="display:inline-block; margin-top:8px; background:#1e5a8c; color:#fff; padding:4px 8px; border-radius:4px; text-decoration:none; font-size:11px; font-weight:bold;">在 Google Map 查看 ↗</a>
                    </div>
                `);
                markersLayer.addLayer(marker);

                // 创建侧边栏列表项
                const item = document.createElement('div');
                item.className = 'restaurant-item';
                item.dataset.name = res.name; // 用于外部定位匹配

                item.innerHTML = `
                    <div class="restaurant-name ${isVisited ? 'visited-green' : ''}">${isVisited ? '✅ ' : ''}${res.name}</div>
                    <div style="font-size:11px; color:var(--text-muted);">${address}</div>
                    <a href="${googleUrl}" target="_blank" class="nav-link" onclick="event.stopPropagation()">查看导航 ↗</a>
                `;

                // 绑定点击事件：飞入动画与高亮
                item.onclick = () => {
                    map.flyTo([lat, lon], 16);
                    marker.openPopup();
                    document.querySelectorAll('.restaurant-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                };

                listContainer.appendChild(item);
            }
        });
    }

    // 4. 数据过滤与排序逻辑
    function process() {
        const query = searchInput.value.toLowerCase();
        let filtered = allData.filter(r => r.name.toLowerCase().includes(query));

        const sortMode = sortSelect.value;
        if (sortMode === 'az') filtered.sort((a,b) => a.name.localeCompare(b.name, 'zh-CN'));
        if (sortMode === 'za') filtered.sort((a,b) => b.name.localeCompare(a.name, 'zh-CN'));

        render(filtered);
    }

    searchInput.addEventListener('input', process);
    sortSelect.addEventListener('change', process);

    // 5. 初始化拉取数据
    fetch('data.json')
        .then(r => r.json())
        .then(d => {
            allData = d;
            render(allData);
        })
        .catch(err => console.error("数据加载失败:", err));

    // 6. 核心优化：联动列表锁定 (精简版)
    window.addEventListener('message', function(e) {
        if (e.data.type === 'FLY_TO' && e.data.name) {
            // 抛弃循环遍历，直接利用 CSS 选择器精准定位目标 DOM
            const targetEl = document.querySelector(`.restaurant-item[data-name="${CSS.escape(e.data.name)}"]`);

            if (targetEl) {
                targetEl.click();
                listContainer.scrollTop = targetEl.offsetTop - listContainer.offsetTop - 10;
            }
        }
    });
</script>
</body>
</html>
