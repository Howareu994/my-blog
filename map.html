<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柏林美食情报台</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #0b2e4a; color: #e0e0e0; }
        #sidebar { width: 35%; padding: 30px; overflow-y: auto; box-sizing: border-box; border-right: 1px solid #1a5b8a; background: linear-gradient(135deg, #0e305a 0%, #1e5a8c 100%); z-index: 10; box-shadow: 2px 0 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        h1 { font-size: 24px; border-bottom: 2px solid #4a8bbd; padding-bottom: 10px; margin-bottom: 20px; color: #ffffff; flex-shrink: 0; }
        
        /* 列表滚动区 */
        #restaurant-list { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }

        .restaurant-item { padding: 15px; margin-bottom: 15px; background-color: rgba(255, 255, 255, 0.08); border-radius: 8px; cursor: pointer; transition: all 0.3s ease; border-left: 4px solid transparent; }
        .restaurant-item:hover { background-color: rgba(255, 255, 255, 0.15); border-left: 4px solid #FFB800; transform: translateX(5px); }
        .restaurant-name { font-weight: bold; font-size: 18px; color: #fff; margin-bottom: 5px; }
        .restaurant-desc { font-size: 14px; color: #b3d4ec; line-height: 1.5; }
        
        #map { width: 65%; height: 100vh; }
        .obsidian-node { background-color: #FFB800; border-radius: 50%; border: 2px solid #0b2e4a; box-shadow: 0 0 10px #FFB800, 0 0 20px #FFB800; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0.8); } 70% { box-shadow: 0 0 0 12px rgba(255, 184, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0); } }

        footer { margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1); font-size: 11px; color: #888; text-align: center; line-height: 1.4; flex-shrink: 0; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 60vh; order: 2; border-right: none; border-top: 1px solid #1a5b8a; }
            #map { width: 100%; height: 40vh; order: 1; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>📍 德国最爱餐厅情报</h1>
        <p style="color: #b3d4ec; font-size: 12px; margin-bottom: 20px;">悬停或点击卡片，点亮柏林美食节点。</p>
        
        <div class="search-container" style="margin-bottom: 15px;">
             <input type="text" id="search-input" placeholder="输入餐厅名搜索..." 
             style="width: 100%; background: #0d2b45; color: white; border: 1px solid #4a8bbd; border-radius: 4px; padding: 8px; box-sizing: border-box;">
        </div>

        <div class="sort-container" style="margin-bottom: 15px;">
            <span style="color: #FFB800; font-size: 14px; margin-right: 5px;">Sortieren:</span>
            <select id="sort-restaurants" style="background: #0d2b45; color: white; border: 1px solid #FFB800; border-radius: 4px; padding: 4px 8px; font-size: 14px; cursor: pointer;">
                <option value="original">Standard (默认顺序)</option>
                <option value="az">A bis Z (正序)</option>
                <option value="za">Z bis A (倒序)</option>
            </select>
        </div>

        <div id="restaurant-list"></div>

        <footer>
            <div style="color: #FFB800; margin-bottom: 5px; font-size: 10px;">数据来源：berlin_slowtour (小红书)</div>
            &copy; 2026 柏林美食雷达<br>
            <a href="#" style="color: #888; text-decoration: none;">Impressum</a> | <a href="#" style="color: #888; text-decoration: none;">Datenschutz</a><br>
            <span style="font-size: 9px;">Kartendaten &copy; OpenStreetMap, CARTO</span>
        </footer>
    </div> 

    <div id="map"></div>

<script>
    // 1. 初始化地图
    const map = L.map('map').setView([52.5200, 13.4050], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

    // 2. 定义两种发光图标
    // 琥珀金 (未去过)
    const amberIcon = L.divIcon({ className: 'obsidian-node', iconSize: [12, 12], iconAnchor: [6, 6] });
    
    // 翡翠绿 (已打卡) - 修正了 CSS 语法中的分号和 px 单位
    const greenIcon = L.divIcon({ 
        className: 'obsidian-node', 
        html: '<div style="background-color: #00FF88; width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 10px #00FF88, 0 0 20px #00FF88;"></div>',
        iconSize: [12, 12], 
        iconAnchor: [6, 6] 
    });

    const markersLayer = L.layerGroup().addTo(map); 
    const listContainer = document.getElementById('restaurant-list');
    let allData = []; 

    // 3. 渲染函数
    function renderRestaurants(dataToRender) {
        listContainer.innerHTML = ''; 
        markersLayer.clearLayers();  

        dataToRender.forEach(res => {
            const lat = res.lat;
            const lon = res.lon || res.lng;

            // --- 关键改进：万能匹配 Visited 状态 ---
            // 无论 JSON 里是 Visited 还是 visited，是 Yes 还是 yes，通通兼容
            const rawVisited = res.Visited || res.visited || "";
            const isVisited = rawVisited.toString().toLowerCase().trim() === 'yes';

            if (lat && lon) {
                // 修正 Google Maps 链接拼接逻辑
                const mapLink = res.link || `https://www.google.com/maps/search/${encodeURIComponent(res.name + ' Berlin')}`;

                // B. 创建地图标记
                const marker = L.marker([lat, lon], {icon: isVisited ? greenIcon : amberIcon});
                marker.bindPopup(`
                    <div style="color: #0b2e4a; min-width: 150px;">
                        <b style="font-size: 14px;">${isVisited ? '✅ ' : ''}${res.name}</b><br>
                        <span style="font-size: 12px; color: #666;">${res.address}</span><br>
                        <a href="${mapLink}" target="_blank" style="display: inline-block; margin-top: 8px; color: #1e5a8c; text-decoration: none; font-weight: bold; border: 1px solid #1e5a8c; padding: 2px 8px; border-radius: 4px;">在 Google Map 查看 ↗</a>
                    </div>
                `);
                markersLayer.addLayer(marker);

                // C. 创建列表卡片
                const item = document.createElement('div');
                item.className = 'restaurant-item';
                item.innerHTML = `
                    <div class="restaurant-name">${isVisited ? '<span style="color: #00FF88;">✅</span> ' : ''}${res.name}</div>
                    <div class="restaurant-desc">${res.address}</div>
                    <div style="margin-top: 5px;"><a href="${mapLink}" target="_blank" style="color: #FFB800; font-size: 11px; text-decoration: none;">查看详情 & 导航 ↗</a></div>
                `;
                
                const trigger = () => {
                    map.flyTo([lat, lon], 15, { animate: true, duration: 1.5 });
                    marker.openPopup();
                };
                item.addEventListener('mouseenter', trigger);
                item.addEventListener('click', trigger);
                
                listContainer.appendChild(item);
            }
        });
    }

    // 4. 初始化获取数据
    fetch('data.json')
        .then(response => {
            if (!response.ok) throw new Error('读取 data.json 失败');
            return response.json();
        })
        .then(data => {
            allData = data; 
            renderRestaurants(allData);
        })
        .catch(err => {
            console.error("加载失败:", err);
            listContainer.innerHTML = '<p style="color:red; padding:20px;">数据加载失败，请检查 data.json</p>';
        });

    // 5. 排序逻辑
    document.getElementById('sort-restaurants').addEventListener('change', function(e) {
        let sortedData = [...allData];
        const mode = e.target.value;
        if (mode === 'az') sortedData.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
        else if (mode === 'za') sortedData.sort((a, b) => b.name.localeCompare(a.name, 'zh-CN'));
        renderRestaurants(sortedData);
        listContainer.scrollTop = 0;
    });

    // 6. 搜索逻辑
    document.getElementById('search-input').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        const filteredData = allData.filter(res => 
            res.name.toLowerCase().includes(term) || 
            res.address.toLowerCase().includes(term)
        );
        renderRestaurants(filteredData);
    });
</script>
</body>
</html>
