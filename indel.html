<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柏林美食情报台</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        
        /* 页面基础设置：暮空蓝主题 */
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #0b2e4a; color: #e0e0e0; }
        
        /* 左侧：文字博客区 */
        #sidebar { width: 35%; padding: 30px; overflow-y: auto; box-sizing: border-box; border-right: 1px solid #1a5b8a; background: linear-gradient(135deg, #0e305a 0%, #1e5a8c 100%); z-index: 10; box-shadow: 2px 0 15px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; border-bottom: 2px solid #4a8bbd; padding-bottom: 10px; margin-bottom: 20px; color: #ffffff; }
        
        /* 餐厅卡片设计 */
        .restaurant-item { padding: 15px; margin-bottom: 15px; background-color: rgba(255, 255, 255, 0.08); border-radius: 8px; cursor: pointer; transition: all 0.3s ease; border-left: 4px solid transparent; }
        .restaurant-item:hover { background-color: rgba(255, 255, 255, 0.15); border-left: 4px solid #FFB800; transform: translateX(5px); }
        .restaurant-name { font-weight: bold; font-size: 18px; color: #fff; margin-bottom: 5px; }
        .restaurant-desc { font-size: 14px; color: #b3d4ec; line-height: 1.5; }
        
        /* 右侧：地图区 */
        #map { width: 65%; height: 100vh; }

        /* 自定义地图标记：赛博琥珀金节点（带深色边框适配浅色地图） */
        .obsidian-node { background-color: #FFB800; border-radius: 50%; border: 2px solid #0b2e4a; box-shadow: 0 0 10px #FFB800, 0 0 20px #FFB800; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0.8); } 70% { box-shadow: 0 0 0 12px rgba(255, 184, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0); } }
    /* --- 移动端手机适配补丁 --- */
@media (max-width: 768px) {
    body {
        flex-direction: column; /* 将左右并排改为上下堆叠 */
    }

    #sidebar {
        width: 100%;       /* 宽度占满屏幕 */
        height: 60vh;      /* 列表占屏幕 60% 的高度 */
        order: 2;          /* 将列表排在下面 */
        border-right: none;
        border-top: 1px solid #1a5b8a;
    }

    #map {
        width: 100%;       /* 宽度占满屏幕 */
        height: 40vh;      /* 地图占屏幕 40% 的高度 */
        order: 1;          /* 将地图排在上面 */
    }

    h1 {
        font-size: 20px;   /* 手机上标题稍微调小一点 */
        margin-bottom: 10px;
    }
}</style>
</head>
<body>

    <div id="sidebar">
        <h1>📍 德国最爱餐厅情报</h1>
        <p style="color: #b3d4ec; font-size: 12px; margin-bottom: 30px;">将鼠标悬停在餐厅卡片上，右侧地图将自动定位并点亮节点。</p>
        
        <div class="sort-container" style="margin-bottom: 15px;">
            <span style="color: #FFB800; font-size: 14px; margin-right: 5px;">Sortieren:</span>
            <select id="sort-restaurants" style="background: #0d2b45; color: white; border: 1px solid #FFB800; border-radius: 4px; padding: 4px 8px; font-size: 14px; cursor: pointer;">
                <option value="original">Standard (默认顺序)</option>
                <option value="az">A bis Z (正序)</option>
                <option value="za">Z bis A (倒序)</option>
            </select>
        </div>

        
        <div style="margin-top: 30px; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1); font-size: 11px; color: #888; text-align: center; line-height: 1.4;">
            &copy; 2026 柏林美食雷达<br>
            <a href="#" style="color: #888; text-decoration: none;">Impressum</a> | <a href="#" style="color: #888; text-decoration: none;">Datenschutz</a><br>
            <span style="font-size: 9px;">Kartendaten &copy; OpenStreetMap, CARTO</span>
        </div>
    


    </div> <div id="map"></div>

<script>
    // 1. 初始化地图 (只定义一次)
    const map = L.map('map').setView([52.5200, 13.4050], 12);

    // 2. 引入底图
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CartoDB',
        maxZoom: 19
    }).addTo(map);

    // 3. 定义自定义图标 (只定义一次)
    const glowingIcon = L.divIcon({
        className: 'obsidian-node',
        iconSize: [12, 12],
        iconAnchor: [6, 6]
    });

    const markers = {};
    const sidebar = document.getElementById('sidebar');

    // 4. 去读取 data.json 并动态生成内容
    console.log("🚀 开始尝试读取 data.json...");

    fetch('data.json')
        .then(response => {
            if (!response.ok) throw new Error('找不到 data.json，请检查文件是否在 Dashboard 文件夹内');
            return response.json();
        })
        .then(data => {
            console.log("✅ 成功读取数据，餐厅数量:", data.length);
            
            // 清空左侧可能存在的旧列表
            // 只保留标题，删除原本硬编码的测试餐厅
            const header = sidebar.querySelector('h1').outerHTML;
            const sortContainer = document.querySelector('.sort-container').outerHTML;
            const note = sidebar.querySelector('p').outerHTML;
            sidebar.innerHTML = header + note + sortContainer;

            data.forEach(res => {
                const lat = res.lat;
                const lon = res.lon || res.lng; // 兼容不同键名

                if (lat && lon) {
                    // A. 地图打点
                    const marker = L.marker([lat, lon], {icon: glowingIcon}).addTo(map);
                    marker.bindPopup(`<b>${res.name}</b><br>${res.address}`);
                    markers[res.name] = marker;

                    // B. 侧边栏卡片
                    const item = document.createElement('div');
                    item.className = 'restaurant-item';
                    item.innerHTML = `
                        <div class="restaurant-name">${res.name}</div>
                        <div class="restaurant-desc">${res.address}<br><small>来源: ${res.quelle || '未标记'}</small></div>
                    `;
                    
                    // C. 交互绑定
                    const flyToRes = () => {
                        map.flyTo([lat, lon], 15, { animate: true, duration: 1.5 });
                        marker.openPopup();
                    };
                    item.addEventListener('mouseenter', flyToRes);
                    item.addEventListener('click', flyToRes);
                    
                    sidebar.appendChild(item);
                }
            });
        })
        .catch(err => {
            console.error("🚨 发生了错误:", err);
            alert("地图数据加载失败，请看 Console 报错信息");
        });
</script>
    
</body>
</html>
