name: Update Berlin Intelligence

on:
  schedule:
    - cron: '0 * * * *' # 每小时零分准时出动
  workflow_dispatch:      # 允许你在 Actions 界面手动点击运行

# 核心补丁：显式赋予机器人写权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 更新到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 更新到 v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Commit and Push
        run: |
          git config --global user.name "Intelligence-Bot"
          git config --global user.email "bot@github.com"
          # 检查文件是否有变化，防止空提交报错
          git add data/news.json
          if git diff --staged --quiet; then
            echo "没有情报更新"
          else
            git commit -m "🤖 自动更新情报: $(date)"
            git push
          fi