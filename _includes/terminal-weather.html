<!-- _includes/terminal-weather.html -->
<style>
    .window-ticker {
        background: #00008B !important; /* cyber-blue */
        color: #fff !important;
        height: 35px;
        border-bottom: 2px solid #ff4d94; /* hot-pink */
        overflow: hidden;
        display: flex;
        align-items: center;
        width: 100%;
    }
    .ticker-track { display: flex; white-space: nowrap; animation: scroll-os 30s linear infinite; }
    @keyframes scroll-os { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .w-item { padding: 0 35px; font-size: 11px; font-weight: 800; font-family: monospace; display: flex; align-items: center; gap: 8px; }
    .w-label { opacity: 0.7; font-weight: 400; font-size: 10px; }
</style>

<div class="window-ticker">
    <div class="ticker-track">
        {% for i in (1..2) %} <!-- 循环两次实现无缝滚动 -->
        <div class="weather-group" style="display: flex; align-items: center;">
            <span class="w-item"><span class="w-label">城市</span> <span class="w-desc">柏林</span></span>
            <span class="w-item"><span class="w-label">实时温度</span> <span class="w-temp">--°C</span></span>
            <span class="w-item">🌬️ <span class="w-label">风速</span> <span class="w-wind">-- km/h</span></span>
            <span class="w-item">💧 <span class="w-label">湿度</span> <span class="w-hum">--%</span></span>
            <span class="w-item">🕒 <span class="w-label">更新</span> <span class="w-time">--:--</span></span>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    if (typeof syncBerlinWeather !== 'function') { // 防止重复定义
        async function syncBerlinWeather() {
            try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=52.52&longitude=13.41&current=temperature_2m,relative_humidity_2m,wind_speed_10m&timezone=Europe%2FBerlin");
                const data = await res.json();
                const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
                document.querySelectorAll('.w-temp').forEach(el => el.innerText = `${Math.round(data.current.temperature_2m)}°C`);
                document.querySelectorAll('.w-wind').forEach(el => el.innerText = `${data.current.wind_speed_10m} km/h`);
                document.querySelectorAll('.w-hum').forEach(el => el.innerText = `${data.current.relative_humidity_2m}%`);
                document.querySelectorAll('.w-time').forEach(el => el.innerText = time);
            } catch (e) { console.error("Weather Sync Error"); }
        }
        document.addEventListener("DOMContentLoaded", () => {
            syncBerlinWeather();
            setInterval(syncBerlinWeather, 600000);
        });
    }
</script>
