<ul class="social-media-list" style="list-style: none; padding: 0; margin: 0;">
  
  {%- if site.github_username -%}
  <li style="margin-bottom: 12px;">
    <a href="https://github.com/{{ site.github_username | cgi_escape | escape }}" style="display: inline-flex; align-items: center; text-decoration: none;">
      <!-- 使用静态图片 CDN，强制 16px，flex-shrink: 0 保证绝不缩放 -->
      <img src="https://cdn.simpleicons.org/github/64748b" width="16" height="16" style="margin-right: 10px; flex-shrink: 0; display: block;">
      <span class="username" style="font-size: 14px; color: #64748b; line-height: 1;">{{ site.github_username | escape }}</span>
    </a>
  </li>
  {%- endif -%}

  {%- if site.xiaohongshu_username -%}
  <li style="margin-bottom: 12px;">
    <a href="https://www.xiaohongshu.com/user/profile/{{ site.xiaohongshu_username | escape }}" style="display: inline-flex; align-items: center; text-decoration: none;">
      <!-- 小红书使用品牌红 #ff2442，强制锁死尺寸 -->
      <img src="https://cdn.simpleicons.org/xiaohongshu/ff2442" width="16" height="16" style="margin-right: 10px; flex-shrink: 0; display: block;">
      <span class="username" style="font-size: 14px; color: #64748b; line-height: 1;">柏林反潮流日志</span>
    </a>
  </li>
  {%- endif -%}

  {%- if site.rss -%}
  <li>
    <a href="{{ 'feed.xml' | relative_url }}" style="display: inline-flex; align-items: center; text-decoration: none;">
      <img src="https://cdn.simpleicons.org/rss/f5a623" width="16" height="16" style="margin-right: 10px; flex-shrink: 0; display: block;">
      <span style="font-size: 14px; color: #64748b; line-height: 1;">RSS Feed</span>
    </a>
  </li>
  {%- endif -%}

</ul>
